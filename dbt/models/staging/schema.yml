version: 2

models:
  - name: stg_orders
    description: "Cleaned orders with typed timestamps and status"
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: [created, approved, invoiced, processing, shipped, delivered, unavailable, canceled]
      - name: order_purchase_at
        tests: [not_null]

  - name: stg_order_items
    description: "Cleaned order line items with derived total_item_value"
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: price
        tests: [not_null]

  - name: stg_order_payments
    description: "Cleaned payment records per order"
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values: [credit_card, boleto, voucher, debit_card, not_defined]
      - name: payment_value
        tests: [not_null]

  - name: stg_order_reviews
    description: "Cleaned customer reviews — nulls allowed on comment fields. review_id has known duplicates in the Olist dataset (789 rows)."
    columns:
      - name: review_id
        tests: [not_null]
      - name: order_id
        tests: [not_null]
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_customers
    description: "Cleaned customer dimension — customer_id is per-order, customer_unique_id is the true key"
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_unique_id
        tests: [not_null]
      - name: customer_state
        tests: [not_null]

  - name: stg_sellers
    description: "Cleaned seller dimension"
    columns:
      - name: seller_id
        tests: [unique, not_null]
      - name: seller_state
        tests: [not_null]

  - name: stg_products
    description: "Cleaned product dimension with typed numeric columns"
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: stg_product_categories
    description: "Portuguese-to-English category name translation lookup"
    columns:
      - name: product_category_name
        tests: [unique, not_null]
      - name: product_category_name_english
        tests: [not_null]
