version: 2

models:
  - name: int_orders_enriched
    description: "Orders joined with customers and delivery KPIs — one row per order"
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_unique_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]

  - name: int_order_financials
    description: "Order items joined with products, categories, and sellers — one row per item"
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: price
        tests: [not_null]
