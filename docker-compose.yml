x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow_meta
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: 'admin:Admin'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_PASSWORDS_HASHED: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-api-server:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: '${AIRFLOW_JWT_SECRET:-changeme-jwt-secret}'
    AIRFLOW__SCHEDULER__DAG_FILE_PROCESSOR_TIMEOUT: '300'
    AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT: '300'
    PYTHONPATH: '/opt/airflow'
    DUCKDB_PATH: /opt/airflow/data/ecommerce.duckdb
    KAGGLE_USERNAME: '${KAGGLE_USERNAME}'
    KAGGLE_KEY: '${KAGGLE_KEY}'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./ingestion:/opt/airflow/ingestion
    - ./tests:/opt/airflow/tests
    - ./passwords.json:/opt/airflow/simple_auth_manager_passwords.json.generated
    - duckdb-data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow_meta
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    user: "0"
    command: >
      bash -c "
        mkdir -p /opt/airflow/data &&
        chown -R 50000:0 /opt/airflow/data &&
        chmod -R 775 /opt/airflow/data &&
        airflow db migrate &&
        airflow pools set duckdb_pool 1 'DuckDB single writer' &&
        echo 'Init complete'
      "
    restart: "no"

  airflow-api-server:
    <<: *airflow-common
    command: api-server --workers 1
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 60s
      timeout: 60s
      retries: 5
      start_period: 300s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--local"]
      interval: 60s
      timeout: 60s
      retries: 5
      start_period: 300s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    environment:
      SUPERSET_SECRET_KEY: '${SUPERSET_SECRET_KEY:-changeme-superset-secret}'
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    ports:
      - "8088:8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/docker-entrypoint.sh:/docker-entrypoint.sh
      - duckdb-data:/opt/airflow/data
    entrypoint: ["/bin/bash", "/docker-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  duckdb-data:
  airflow-logs:
